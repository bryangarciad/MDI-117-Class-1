name: Ipad CI Build And Test Worflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "master", "develop"]
    
jobs:
  build-and-test:
    name: Build And Test
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        
      - name: Execute Testing Suite
        working-directory: ./ProfessorToDo
        run: |
          xcodebuild test \
            -project "ProfessorToDo.xcodeproj" \
            -scheme "ProfessorToDo" \
            -destination 'platform=iOS Simulator,name=ipad Pro (12.9-inch) (6th generation,OS=latest)'
            -enableCodeCoverage YES \
            clean build test
            
      
