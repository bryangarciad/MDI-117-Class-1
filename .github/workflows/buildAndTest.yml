name: iPad CI – Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run Tests
        working-directory: ProfessorToDo
        run: |
          xcodebuild test \
            -project "ProfessorToDo.xcodeproj" \
            -scheme "ProfessorToDo" \
            -destination "platform:iOS Simulator,arch:arm64,id:3275451F-C3F7-4DB6-B086-96397022262C,OS:18.5,name:iPad (10th generation)" \
            -enableCodeCoverage YES \
            clean build test
