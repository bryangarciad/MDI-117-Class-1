name: iPad CI – Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        
      - name: debug step 1
        run: ls
        
      - name: debug step 2
        run: cd ProfessorToDo

      - name: debug step 3
        run: ls

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "ProfessorToDo.xcodeproj" \
            -scheme "ProfessorToDo" \
            -destination 'platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation),OS=latest' \
            -enableCodeCoverage YES \
            clean build test
